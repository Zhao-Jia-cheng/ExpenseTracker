<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
 
  <header>
    <h1>💸 Expense Tracker</h1>
  </header>
 
  <main>
 
    <!--ADD EXPENSE FORM-->
    <section class="card form-section">
      <h2>Add Expense</h2>
      <form id="expense-form">
 
        <div class="form-group">
          <label for="description">Description</label>
          <input type="text" id="description" placeholder="e.g. Lunch at Joe's" />
        </div>
 
        <div class="form-group">
          <label for="amount">Amount ($)</label>
          <input type="number" id="amount" min="0" step="0.01" placeholder="0.00" />
        </div>
 
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Housing">Housing</option>
            <option value="Other">Other</option>
          </select>
        </div>
 
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" />
        </div>
 
        <!-- Inline error shown by JS -->
        <p id="form-error" class="error-msg hidden"></p>
 
        <button type="submit" class="btn-primary">+ Add Expense</button>
      </form>
    </section>
 
    <!--CONTROLS: FILTER + SORT-->
    <section class="card controls-section">
      <div class="control-group">
        <label for="filter-category">Filter by Category</label>
        <select id="filter-category">
          <option value="All">All</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Housing">Housing</option>
          <option value="Other">Other</option>
        </select>
      </div>
 
      <div class="control-group">
        <label for="sort-by">Sort by</label>
        <select id="sort-by">
          <option value="date-desc">Date (Newest First)</option>
          <option value="date-asc">Date (Oldest First)</option>
          <option value="amount-desc">Amount (High → Low)</option>
          <option value="amount-asc">Amount (Low → High)</option>
        </select>
      </div>
    </section>
 
    <!--SUMMARY/TOTALS-->
    <section class="card summary-section">
      <div class="summary-top">
        <div class="summary-stat">
          <span class="stat-label">Showing</span>
          <span id="expense-count" class="stat-value">0 expenses</span>
        </div>
        <div class="summary-stat">
          <span class="stat-label">Total</span>
          <span id="total-amount" class="stat-value">$0.00</span>
        </div>
        <div class="convert-group">
          <button id="convert-btn" class="btn-secondary">Convert to EUR</button>
          <span id="converted-amount" class="converted hidden"></span>
        </div>
      </div>
 
      <!--Per-category breakdown-->
      <div id="category-totals" class="category-totals"></div>
    </section>
 
    <!--EXPENSE LIST-->
    <section class="card list-section">
      <h2>Expenses</h2>
      <ul id="expense-list"></ul>
    </section>
 
  </main>
 
  <script src="script.js"></script>
</body>
</html>
